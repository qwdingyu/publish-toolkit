name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run 模式（只预览，不实际发布）'
        type: boolean
        default: false
      tag:
        description: 'dist-tag（正式版用 latest，beta 用 beta）'
        type: string
        default: latest

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tools
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "🧪 Dry-run 模式..."
              npm publish --dry-run --tag=${{ inputs.tag }}
            else
              echo "🚀 手动触发正式发布..."
              npm publish --tag=${{ inputs.tag }}
            fi
          else
            echo "🚀 Tag 触发自动发布: ${{ github.ref_name }}"
            npm publish --tag=latest
          fi

      - name: Display publish result
        if: success()
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "✅ ${PACKAGE_NAME}@${PACKAGE_VERSION} 发布成功！"
          echo "   查看: https://www.npmjs.com/package/${PACKAGE_NAME}"
